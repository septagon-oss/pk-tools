name: Release
on:
  push:
    tags: ['v*']
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go test -race ./...
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
